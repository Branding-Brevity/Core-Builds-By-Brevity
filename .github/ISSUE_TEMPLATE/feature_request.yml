name: 💡 Feature Request
description: Suggest an improvement to an existing template, formatter, or guide
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Template configuration
        - Formatter / visual layout
        - Documentation / guides
        - GitHub repository structure
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What would you like to see?
      placeholder: "e.g. An ESE that blocks season packs for ongoing series..."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why would this help?
      placeholder: "e.g. Currently season packs sometimes play the wrong episode..."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
