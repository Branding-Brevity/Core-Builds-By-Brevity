name: Generate JSON Formatters

on:
  push:
    paths:
      - 'Formatters/Source/**/*.yml'
      - 'Formatters/Source/**/*.yaml'
  workflow_dispatch: # Allows manual triggering

jobs:
  compile-formatters:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the new JSON files back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Compile YAML to JSON
        run: |
          import yaml
          import json
          import glob
          import os
          import sys

          # Find all YAML files in the source directory
          yaml_files = glob.glob('Formatters/Source/*.yml') + glob.glob('Formatters/Source/*.yaml')
          
          if not yaml_files:
              print("⚠️ No YAML files found in Formatters/Source/. Exiting.")
              sys.exit(0)
              
          # Ensure the output directory exists
          os.makedirs('Formatters', exist_ok=True)
          
          errors = 0
          
          for yml_path in yaml_files:
              # Extract filename to match the output JSON
              base_name = os.path.splitext(os.path.basename(yml_path))[0]
              json_path = f'Formatters/{base_name}.json'
              
              with open(yml_path, 'r', encoding='utf-8') as yml_file:
                  try:
                      # Load the YAML data
                      data = yaml.safe_load(yml_file)
                  except yaml.YAMLError as exc:
                      print(f"❌ [ERROR] Failed parsing {yml_path}:\n{exc}")
                      errors += 1
                      continue
                      
              with open(json_path, 'w', encoding='utf-8') as json_file:
                  # Dump strictly formatted JSON, preserving emojis
                  json.dump(data, json_file, indent=2, ensure_ascii=False)
                  
              print(f"✅ Compiled: {yml_path} -> {json_path}")

          if errors > 0:
              sys.exit(1)
        shell: python

      - name: Commit and Push JSON outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Formatters/*.json
          
          # Only commit if the JSON files actually changed
          if git diff-index --quiet HEAD; then
            echo "No formatting changes detected. Nothing to commit."
          else
            git commit -m "build: compile JSON formatters from YAML source"
            git push
            echo "Successfully pushed new JSON formatters to the repository."
          fi
