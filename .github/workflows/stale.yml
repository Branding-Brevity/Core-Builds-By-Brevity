name: Close Stale Issues

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been open for 30 days with no activity.
            It will be closed in 7 days unless there's further discussion.
            If this is still relevant, please comment to keep it open.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant,
            or open a new issue with updated information.
          exempt-issue-labels: 'pinned,security,bug,in-progress'

          # PRs
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This PR has been open for 21 days with no activity.
            It will be closed in 7 days. Please rebase and update if you'd like it reviewed.
          close-pr-message: >
            Closing due to inactivity. Please reopen when ready.
          exempt-pr-labels: 'pinned,security,in-progress'
