name: Validate Templates

on:
  push:
    paths:
      - 'Templates/**/*.json'
      - 'Formatters/**/*.json'
      - 'Regex/**/*.json'
  pull_request:
    paths:
      - 'Templates/**/*.json'
      - 'Formatters/**/*.json'
      - 'Regex/**/*.json'
      - 'Community-Templates/**/*.json'

jobs:
  validate-json:
    name: Validate JSON Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate all JSON files
        run: |
          import json
          import sys
          from pathlib import Path

          errors = 0
          # Define files to scan, explicitly excluding the .github directory
          files = [f for f in Path('.').rglob('*.json') if '.github' not in f.parts]

          print(f"Checking {len(files)} files...")

          for fpath in sorted(files):
              # Skip empty files
              if fpath.stat().st_size == 0:
                  print(f"  SKIP  {fpath} (Empty file)")
                  continue
                  
              try:
                  with open(fpath, 'r', encoding='utf-8') as f:
                      json.load(f)
                  print(f"  PASS  {fpath}")
              except json.JSONDecodeError as e:
                  print(f"  FAIL  {fpath}: {e}")
                  errors += 1
              except Exception as e:
                  print(f"  FAIL  {fpath}: Could not read file: {e}")
                  errors += 1

          if errors > 0:
              print(f"\n{errors} file(s) failed validation.")
              sys.exit(1)
          else:
              print("\nSuccess: All files are valid JSON.")
        shell: python
        
