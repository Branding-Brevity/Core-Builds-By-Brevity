name: Validate Templates

on:
  push:
    paths:
      - 'Templates/**/*.json'
      - 'Formatters/**/*.json'
      - 'Filtering/**/*.json'
  pull_request:
    paths:
      - 'Templates/**/*.json'
      - 'Formatters/**/*.json'
      - 'Filtering/**/*.json'
      - 'Community-Templates/**/*.json'

jobs:
  validate:
    name: Validate JSON Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate JSON + template integrity
        shell: python
        run: |
          import json, sys, pathlib

          VALID_FORMATTER_IDS = {
            'custom', 'tamtaro', 'prism', 'gdrive',
            'lightgdrive', 'minimalisticgdrive', 'torrentio', 'torbox'
          }

          INVALID_SEL = ['or(', 'keyword(', 'language(']

          errors   = []
          warnings = []

          files = [
            f for f in pathlib.Path('.').rglob('*.json')
            if '.github' not in str(f)
          ]

          print(f"Scanning {len(files)} JSON file(s)...\n")

          for fpath in sorted(files):

            # ── 1. Valid JSON ───────────────────────────────────────────────
            try:
              with open(fpath) as f:
                data = json.load(f)
            except json.JSONDecodeError as e:
              errors.append(f"{fpath}: Invalid JSON — {e}")
              print(f"  FAIL (json)  {fpath}")
              continue

            # Only deep-validate template files
            is_template = (
              'Templates' in str(fpath) or
              'Community-Templates' in str(fpath)
            )
            if not is_template:
              print(f"  PASS (json)  {fpath}")
              continue

            c    = data.get('config', {})
            meta = data.get('metadata', {})
            fail = False

            # ── 2. formatter.id valid ───────────────────────────────────────
            fmt_id = c.get('formatter', {}).get('id')
            if fmt_id and fmt_id not in VALID_FORMATTER_IDS:
              errors.append(
                f"{fpath}: formatter.id '{fmt_id}' invalid — "
                f"must be one of {sorted(VALID_FORMATTER_IDS)}"
              )
              fail = True

            # ── 3. All presets have instanceId ──────────────────────────────
            for i, p in enumerate(c.get('presets', [])):
              if not p.get('instanceId'):
                errors.append(
                  f"{fpath}: presets[{i}] ({p.get('type','?')}) "
                  f"missing instanceId"
                )
                fail = True

            # ── 4. All presets have timeout ─────────────────────────────────
            for i, p in enumerate(c.get('presets', [])):
              if 'timeout' not in p.get('options', {}):
                errors.append(
                  f"{fpath}: presets[{i}] ({p.get('type','?')}) "
                  f"missing options.timeout"
                )
                fail = True

            # ── 5. No invalid SEL functions ─────────────────────────────────
            all_exprs = (
              c.get('excludedStreamExpressions', []) +
              c.get('preferredStreamExpressions', []) +
              c.get('includedStreamExpressions', [])
            )
            for ese in all_exprs:
              expr = ese.get('expression', '')
              for bad in INVALID_SEL:
                if bad in expr:
                  errors.append(
                    f"{fpath}: expression uses invalid SEL '{bad}'"
                  )
                  fail = True
              # not() check — must not appear unless inside negate()
              if 'not(' in expr and 'negate(' not in expr:
                errors.append(
                  f"{fpath}: expression uses not() — use negate()"
                )
                fail = True

            # ── 6. preferredResolutions ⊆ includedResolutions ──────────────
            incl = set(c.get('includedResolutions', []))
            if incl:
              extras = [
                r for r in c.get('preferredResolutions', [])
                if r not in incl
              ]
              if extras:
                warnings.append(
                  f"{fpath}: preferredResolutions has entries "
                  f"not in includedResolutions: {extras}"
                )

            # ── 7. addonName present ────────────────────────────────────────
            if not c.get('addonName'):
              warnings.append(f"{fpath}: addonName missing")

            # ── 8. metadata.version present ────────────────────────────────
            if not meta.get('version'):
              warnings.append(f"{fpath}: metadata.version missing")

            status = 'FAIL' if fail else 'PASS'
            print(f"  {status}         {fpath}")

          # ── Summary ────────────────────────────────────────────────────────
          print()
          if warnings:
            print(f"⚠️  {len(warnings)} warning(s):")
            for w in warnings:
              print(f"  {w}")
            print()

          if errors:
            print(f"❌ {len(errors)} error(s):")
            for e in errors:
              print(f"  {e}")
            sys.exit(1)
          else:
            print(f"✅ All {len(files)} files passed.")
